name: buildmatch_mobile
description: "BuildMatch - Flutter Clean Architecture"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  flutter_bloc: ^9.1.0
  get_it: ^8.0.3
  go_router: ^14.8.1
  dartz: ^0.10.1
  equatable: ^2.0.7
  onesignal_flutter: ^5.2.12
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  flutter_native_splash: ^2.4.7
  google_fonts: ^8.0.2
  lottie: ^3.3.3
  lucide_icons_flutter: ^3.1.13
  flutter_dotenv: ^6.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # An image asset can refer to one or more resolution-specific "variants", see

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

flutter_native_splash:
  color: "#F5F5F5"
  image: assets/icons/buildmatch.png
  android: true
  ios: true
